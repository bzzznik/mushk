    {t:"Хозяйство, скотина, земля",                            s:{V:3,AF:2}},
    {t:"Баскетбол каждую пятницу и старое кино",               s:{AS:3}}
  ]},
  {q:"Как ты реагируешь на чужие ошибки?",opts:[
    {t:"Указываю и объясняю как правильно",                    s:{P:3}},
    {t:"Я потерял нить — это ошибка или так задумано?",        s:{R:3}},
    {t:"Дизлайк. Всё сказано.",                                s:{K:3}},
    {t:"Молчу — сам разберётся",                               s:{NK:2,V:2}},
    {t:"Ну и ладно, все ошибаются",                            s:{AN:2,AF:2}},
    {t:"Так и знал. Страну развалили.",                        s:{AF:3}},
    {t:"Поясни, в чём суть?",                                  s:{AS:3}}
  ]},
  {q:"Твоя реакция на новость про мороз -33?",opts:[
    {t:"Пишу в чат температуру с точностью до района",         s:{P:3}},
    {t:"Напряжённая обстановка.",                              s:{R:3}},
    {t:"Ужас, сижу дома с кофе",                              s:{K:3}},
    {t:"Проверяю прогноз на неделю",                           s:{NK:3}},
    {t:"Нормально. У нас и похолоднее бывало.",                s:{V:3,AF:2}},
    {t:"Сорян, я в тепле",                                     s:{AN:2}},
    {t:"У меня бенгальские огни — согреемся",                  s:{AS:3}}
  ]},
  {q:"Что для тебя важнее всего в общении?",opts:[
    {t:"Чтобы все были при деле и знали свою роль",            s:{P:3}},
    {t:"Честность и немного юмора",                            s:{R:3}},
    {t:"Живость и ирония — скучно не должно быть",             s:{K:3}},
    {t:"Забота и внимание к людям",                            s:{N:3}},
    {t:"Краткость — сестра таланта",                           s:{AN:3}},
    {t:"Память о прошлом и уважение к истории",                s:{AF:3}},
    {t:"Факты и спокойный тон",                                s:{NK:3}},
    {t:"Живые эмоции и узнавание старых друзей",               s:{AS:3}}
  ]}
];

var TOTAL=15;
var cur=0,scores={},chosen=null,qs=[],curOpts=[];

function shuffle(a){
  var arr=a.slice();
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i];arr[i]=arr[j];arr[j]=t;
  }
  return arr;
}

function initQuiz(){
  qs=shuffle(BANK).slice(0,TOTAL);
  cur=0;chosen=null;
  scores={P:0,R:0,K:0,N:0,AN:0,AF:0,V:0,NK:0,AS:0};
}

function render(){
  var q=qs[cur];
  document.getElementById('qnum').textContent='Вопрос '+(cur+1)+' из '+TOTAL;
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('prog').style.width=(cur/TOTAL*100)+'%';
  var c=document.getElementById('opts');
  c.innerHTML='';
  curOpts=shuffle(q.opts);
  curOpts.forEach(function(o,i){
    var b=document.createElement('button');
    b.className='opt';
    b.textContent=o.t;
    b.onclick=(function(idx){return function(){select(idx);};})(i);
    c.appendChild(b);
  });
  chosen=null;
  document.getElementById('nextbtn').style.display='none';
}

function select(i){
  chosen=i;
  var all=document.querySelectorAll('.opt');
  for(var j=0;j<all.length;j++) all[j].classList.remove('chosen');
  all[i].classList.add('chosen');
  document.getElementById('nextbtn').style.display='inline-block';
}

function nextQ(){
  if(chosen===null) return;
  var s=curOpts[chosen].s;
  for(var k in s) scores[k]=(scores[k]||0)+s[k];
  cur++;
  if(cur>=TOTAL){showResult();return;}
  render();
}

function showResult(){
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('prog').style.width='100%';
  var best='P',bestScore=0;
  for(var k in scores){
    if(scores[k]>bestScore){bestScore=scores[k];best=k;}
  }
  var ch=CHARS[best];
  document.getElementById('res-avatar').textContent=ch.avatar;
  document.getElementById('res-title').textContent=ch.name;
  document.getElementById('res-role').textContent=ch.role;
  document.getElementById('res-desc').textContent=ch.desc;
  document.getElementById('result').style.display='block';
}

function restart(){
  document.getElementById('result').style.display='none';
  document.getElementById('quiz-section').style.display='block';
  initQuiz();
  render();
}

initQuiz();
render();
</script>
</body>
</html>
